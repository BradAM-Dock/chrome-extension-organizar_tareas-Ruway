<head>

</head>

    <!-- COLUMNA IZQUIERDA: LISTA DE TAREAS -->

      <!-- Aquí JavaScript insertará dinámicamente los rectángulos de tareas -->
      <div id="contenedorTareas" class="lista-tareas"></div>

      <!-- Rectángulo con el botón "+" para agregar nuevas tareas -->

        <span class="icono-mas">+</span>
      </div>
    </section>

    <!-- COLUMNA DERECHA: ESPACIO RESERVADO -->
    <section class="columna-derecha">
      <!-- Espacio vacío listo para tus imágenes / animaciones -->
    </section>

  </div>
